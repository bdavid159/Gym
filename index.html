                    {set.technique === 'drop' && set.drops && set.drops.map((drop, dIdx) => (

                            <div className="flex-1 z-10"><input type="number" value={drop.reps} onChange={e => updateDropSet(exId, setIdx, dIdx, 'reps', e.target.value)} disabled={set.completed} className="w-full bg-white border border-purple-300 rounded-xl p-2 text-center font-black text-purple-900 outline-none shadow-sm" placeholder="Reps al fallo"/></div>
                            <div className="w-12 z-10"></div><div className="w-12 z-10"></div>

                    {set.technique === 'drop' && !set.completed && (
                         <div className="flex justify-start pl-[50px] py-1.5 bg-purple-50/40 border-t border-purple-100 relative">

                             <button onClick={() => addTechnique(exId, setIdx, 'add_drop')} className="text-[10px] font-black text-purple-800 bg-purple-100 hover:bg-purple-200 border border-purple-300 px-3 py-1.5 rounded-lg shadow-sm transition-colors z-10">➕ Añadir Strip Set</button>
                         </div>
                    )}
                </div>
            );
        }

                    <div className="flex-1"><input type="number" value={set.h_int} onChange={e => updateSet(exId, setIdx, 'h_int', e.target.value)} disabled={set.completed} className="w-full bg-gray-100 rounded-lg p-2 text-center text-xs font-black outline-none" placeholder="Vel Máx"/></div>
                    <div className="flex-1"><input type="number" value={set.h_off} onChange={e => updateSet(exId, setIdx, 'h_off', e.target.value)} disabled={set.completed} className="w-full bg-gray-100 rounded-lg p-2 text-center text-xs font-black outline-none" placeholder="Vel Base"/></div>
                    <div className="w-14 flex justify-end gap-1">{set.completed && <button onClick={() => deleteSet(exId, setIdx)} className="w-6 bg-red-100 text-red-600 rounded-lg text-xs">🗑️</button>}<button onClick={() => handleComplete(exId, setIdx)} className={`w-8 h-8 rounded-lg font-black text-sm ${set.completed ? 'bg-[#34c759] text-white' : 'bg-[#e5e5ea] text-transparent'}`}>✓</button></div>

        // ==========================================
        // 💧 MÓDULO 2: HIDRATACIÓN (100% INDEPENDIENTE)
        // ==========================================
        function ModuloAgua({ setActiveModule, user, setUser, recordDate, setRecordDate, activarAudioIOS, reproducirAlarma }) {
            const { useState, useEffect, useRef } = React;
            
            const [hydrationMap, setHydrationMap] = useState(() => {
                const saved = localStorage.getItem('sincroFlex_agua_v1');
                return saved ? JSON.parse(saved) : { esposa: {}, esposo: {} };
            });

            const toggleGlass = (index) => {
                const newMap = { ...hydrationMap };
                if (!newMap[user]) newMap[user] = {};
                if (!newMap[user][recordDate]) newMap[user][recordDate] = [];
                const currentDay = newMap[user][recordDate];
                if (currentDay.includes(index)) {
                    newMap[user][recordDate] = currentDay.filter(i => i !== index);
                } else {
                    newMap[user][recordDate] = [...currentDay, index];
                }
                setHydrationMap(newMap);
                localStorage.setItem('sincroFlex_agua_v1', JSON.stringify(newMap));
            };

            const defaultSchedule = [
                { time: "06:00 AM", desc: "Al despertar", highlight: false },
                { time: "07:00 AM", desc: "Pesas AM", highlight: false },
                { time: "08:30 AM", desc: "⚡ BATIDO", highlight: true },
                { time: "09:30 AM", desc: "Desayuno", highlight: false },
                { time: "10:30 AM", desc: "Oficina", highlight: false },
                { time: "11:30 AM", desc: "Oficina", highlight: false },
                { time: "12:30 PM", desc: "Antes de almorzar", highlight: false },
                { time: "01:30 PM", desc: "Almuerzo", highlight: false },
                { time: "03:00 PM", desc: "Oficina", highlight: false },
                { time: "04:30 PM", desc: "Oficina", highlight: false },
                { time: "05:30 PM", desc: "Pre-entreno PM", highlight: false },
                { time: "06:30 PM", desc: "Cardio/Pesas PM", highlight: false },
                { time: "07:30 PM", desc: "⚡ BATIDO", highlight: true },
                { time: "08:30 PM", desc: "Merienda", highlight: false },
                { time: "09:30 PM", desc: "Dormir", highlight: false }
            ];

            const [hydrationSchedule, setHydrationSchedule] = useState(() => {
                const saved = localStorage.getItem('sincroFlex_agua_rutina_v1');
                return saved ? JSON.parse(saved) : defaultSchedule;
            });
            
            const lastAlarmRung = useRef(null); 
            const [newWaterH, setNewWaterH] = useState("12");
            const [newWaterM, setNewWaterM] = useState("00");
            const [newWaterAmPm, setNewWaterAmPm] = useState("PM");
            const [newWaterDesc, setNewWaterDesc] = useState("Vaso de agua");

            const getMinutos = (timeStr) => {
                if (!timeStr) return 0;
                const match = String(timeStr).match(/(\d+):(\d+)\s*(a|p)?/i);
                if (!match) return 0;
                let h = parseInt(match[1]);
                const m = parseInt(match[2]);
                const isPM = match[3] && match[3].toLowerCase() === 'p';
                if (isPM && h !== 12) h += 12;
                if (!isPM && h === 12) h = 0;
                return h * 60 + m;
            };

            const addNewWaterDirect = () => {
                const timeStr = `${newWaterH.padStart(2, '0')}:${newWaterM.padStart(2, '0')} ${newWaterAmPm}`;
                const newSched = [...hydrationSchedule, { time: timeStr, desc: newWaterDesc, highlight: false }];
                newSched.sort((a, b) => getMinutos(a.time) - getMinutos(b.time));
                setHydrationSchedule(newSched);
            };

            useEffect(() => {
                localStorage.setItem('sincroFlex_agua_rutina_v1', JSON.stringify(hydrationSchedule));
            }, [hydrationSchedule]);

            const deleteWaterItem = (index) => {
                setHydrationSchedule(hydrationSchedule.filter((_, i) => i !== index));
            };
            const updateWaterItem = (index, field, value) => {
                const newSched = [...hydrationSchedule];
                newSched[index][field] = value;
                setHydrationSchedule(newSched);
            };

            useEffect(() => {
                const revisarHoraAgua = () => {
                    const ahora = new Date();
                    const minutosActuales = ahora.getHours() * 60 + ahora.getMinutes();

                    const vasoPendiente = hydrationSchedule.find((item, idx) => {
                        const yaTomado = hydrationMap[user]?.[recordDate]?.includes(idx);
                        return !yaTomado && getMinutos(item.time) === minutosActuales;
                    });

                    if (vasoPendiente && lastAlarmRung.current !== minutosActuales) {
                        lastAlarmRung.current = minutosActuales; 
                        reproducirAlarma();
                        document.body.style.backgroundColor = "#0bc5ea";
                        setTimeout(() => { document.body.style.backgroundColor = "#f2f2f7"; }, 1000);
                        
                        if ("Notification" in window && Notification.permission === "granted") {
                            new Notification("💧 Hora de hidratarse", {
                                body: `Toca beber: ${vasoPendiente.desc}`,
                                icon: "https://cdn-icons-png.flaticon.com/512/3105/3105807.png"
                            });
                        }
                    }
                };

                const intervaloAgua = setInterval(revisarHoraAgua, 5000);
                return () => clearInterval(intervaloAgua);
            }, [hydrationSchedule, hydrationMap, user, recordDate, reproducirAlarma]);

            return (
                <div className="flex-1 flex flex-col h-full bg-[#f2f2f7] relative pb-10 animate-slide-up">
                    <div className="pt-10 pb-4 px-5 bg-white shadow-sm rounded-b-3xl z-10 relative">
                        <button onClick={() => setActiveModule('hub')} className="absolute top-4 left-4 bg-gray-100 text-gray-800 px-3 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest">← Volver</button>
                        <div className="flex justify-between items-center mt-6">
                            <div>
                                <h2 className="text-3xl font-black text-gray-900 tracking-tight">💧 Hidratación</h2>
                                <div className="flex items-center gap-2 mt-1">
                                    <p className="text-xs text-gray-500 font-bold">Protocolo 15 Vasos</p>
                                    <button onClick={() => {
                                        activarAudioIOS();
                                        if ("Notification" in window) {
                                            Notification.requestPermission().then(perm => {
                                                if (perm === "granted") {
                                                    new Notification("¡Alarmas Activas! 💧", { body: "Te avisaré cuando toque beber agua." });
                                                } else { alert("Debes permitir las notificaciones en Ajustes."); }
                                            });
                                        }
                                    }} className="text-[9px] bg-cyan-100 text-cyan-700 px-2 py-0.5 rounded-full font-black uppercase active:scale-95 transition-transform shadow-sm">
                                        🔔 Activar Avisos
                                    </button>
                                </div>
                            </div>
                            <input type="date" value={recordDate} onChange={(e) => setRecordDate(e.target.value)} className="bg-gray-100 rounded-xl p-2 text-xs font-bold outline-none"/>
                        </div>
                        <div className="flex bg-[#e5e5ea] rounded-xl p-1 mt-4 shadow-inner">
                            <button onClick={() => setUser('esposa')} className={`flex-1 py-2 text-[11px] font-black uppercase rounded-lg transition-all ${user === 'esposa' ? 'bg-cyan-500 text-white shadow-md' : 'text-gray-500'}`}>👩 Ella</button>
                            <button onClick={() => setUser('esposo')} className={`flex-1 py-2 text-[11px] font-black uppercase rounded-lg transition-all ${user === 'esposo' ? 'bg-blue-600 text-white shadow-md' : 'text-gray-500'}`}>🧔 Él</button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto px-5 mt-6 hide-scrollbar">
                        {/* Barra de Progreso */}
                        {(() => {
                            const tomados = hydrationMap[user]?.[recordDate]?.length || 0;
                            const total = hydrationSchedule.length;
                            const porcentaje = total === 0 ? 0 : Math.min((tomados / total) * 100, 100);
                            const isComplete = total > 0 && tomados === total;
                            const circ = 251.2;
                            const offset = circ - (porcentaje / 100) * circ;
                            return (
                                <div className="bg-white p-6 rounded-[32px] shadow-sm border border-gray-100 mb-6 flex items-center justify-between">
                                    <div>
                                        <h3 className="text-4xl font-black text-gray-900">{tomados} <span className="text-xl text-gray-400">/ {total}</span></h3>
                                        <p className="text-[10px] font-black text-gray-500 uppercase tracking-widest mt-1">{isComplete ? '¡Meta Alcanzada! 🎉' : 'Vasos (250ml)'}</p>
                                    </div>
                                    <div className="relative w-24 h-24">
                                        <svg width="96" height="96" className="transform -rotate-90 drop-shadow-sm"><circle cx="48" cy="48" r="40" stroke="#f2f2f7" strokeWidth="10" fill="none" /><circle cx="48" cy="48" r="40" stroke={isComplete ? '#34c759' : '#0bc5ea'} strokeWidth="10" fill="none" strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" className="transition-all duration-1000 ease-out" /></svg>
                                        <div className="absolute inset-0 flex items-center justify-center text-3xl">{isComplete ? '✅' : '💧'}</div>
                                    </div>
                                </div>
                            );
                        })()}

                        {/* Panel Añadir Vaso */}
                        <div className="bg-white p-4 rounded-[24px] shadow-sm border border-gray-100 mb-6 animate-slide-up">
                            <h4 className="text-xs font-black text-gray-900 uppercase tracking-widest mb-3">➕ Añadir Nuevo Vaso</h4>
                            <div className="flex gap-2 mb-3">
                                <input type="number" min="1" max="12" value={newWaterH} onChange={e => setNewWaterH(e.target.value)} className="flex-1 bg-gray-50 border border-gray-200 rounded-xl p-2 text-center font-black text-gray-900 outline-none" placeholder="HH"/>
                                <span className="font-black text-gray-400 self-center">:</span>
                                <input type="number" min="0" max="59" value={newWaterM} onChange={e => setNewWaterM(e.target.value)} className="flex-1 bg-gray-50 border border-gray-200 rounded-xl p-2 text-center font-black text-gray-900 outline-none" placeholder="MM"/>
                                <select value={newWaterAmPm} onChange={e => setNewWaterAmPm(e.target.value)} className="flex-1 bg-gray-50 border border-gray-200 rounded-xl p-2 font-black text-gray-900 outline-none custom-select"><option>AM</option><option>PM</option></select>
                            </div>
                            <div className="flex gap-2">
                                <input type="text" value={newWaterDesc} onChange={e => setNewWaterDesc(e.target.value)} className="flex-[2] bg-gray-50 border border-gray-200 rounded-xl p-2 text-xs font-bold text-gray-900 outline-none" placeholder="Descripción..."/>
                                <button onClick={addNewWaterDirect} className="flex-1 bg-cyan-500 text-white font-black text-xs rounded-xl shadow-sm hover:bg-cyan-600 transition-colors">Guardar</button>
                            </div>
                        </div>

                        {/* Lista Cronológica */}
                        {(() => {
                            const currentDayMarks = hydrationMap[user]?.[recordDate] || [];
                            const scheduleWithIdx = hydrationSchedule.map((item, idx) => ({ ...item, idx }));
                            scheduleWithIdx.sort((a, b) => getMinutos(a.time) - getMinutos(b.time));
                            const amItems = scheduleWithIdx.filter(item => getMinutos(item.time) < 720);
                            const pmItems = scheduleWithIdx.filter(item => getMinutos(item.time) >= 720);
                            
                            const RenderVaso = ({ item, isChecked }) => (
                                <label key={item.idx} className={`flex flex-col justify-center p-4 rounded-[24px] transition-all border shadow-sm ${isChecked ? 'bg-[#e2f5e2] border-[#28a745]/30' : (item.highlight ? 'bg-cyan-50 border-cyan-100' : 'bg-white border-gray-100')}`}>
                                    <div className="flex items-center justify-between mb-2 gap-2">
                                        <button onClick={(e) => { e.preventDefault(); deleteWaterItem(item.idx); }} className="w-6 h-6 bg-red-50 text-red-500 rounded-full flex items-center justify-center text-xs shadow-sm hover:scale-110 transition-transform">🗑️</button>
                                        <div className={`text-[11px] font-black flex-1 ${isChecked ? 'text-[#1e6a2b]' : (item.highlight ? 'text-cyan-700' : 'text-gray-900')}`}>{item.time}</div>
                                        <div className="relative flex items-center justify-center cursor-pointer">
                                            <input type="checkbox" checked={isChecked} onChange={() => toggleGlass(item.idx)} className="peer sr-only" />
                                            <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition-colors ${isChecked ? 'bg-[#28a745] border-[#28a745]' : 'bg-transparent border-gray-300'}`}>{isChecked && <span className="text-white text-[10px] font-black">✓</span>}</div>
                                        </div>
                                    </div>
                                    <input type="text" value={item.desc} onChange={(e) => updateWaterItem(item.idx, 'desc', e.target.value)} onClick={(e) => e.preventDefault()} className={`w-full bg-transparent outline-none text-[10px] font-bold leading-snug truncate ${isChecked ? 'text-[#2ea043]' : 'text-gray-500'}`} />
                                </label>
                            );

                            return (
                                <div className="space-y-5 animate-slide-up">
                                    {amItems.length > 0 && (
                                        <div className="bg-white rounded-[32px] shadow-sm border border-gray-100 overflow-hidden">
                                            <div className="p-5 bg-gradient-to-r from-blue-50 to-cyan-50 flex justify-between items-center border-b border-blue-100/50"><h3 className="font-black text-blue-900 text-lg flex items-center gap-2">☀️ La Mañana</h3></div>
                                            <div className="p-4 grid grid-cols-2 gap-3 bg-gray-50/30">{amItems.map(item => RenderVaso({ item, isChecked: currentDayMarks.includes(item.idx) }))}</div>
                                        </div>
                                    )}
                                    {pmItems.length > 0 && (
                                        <div className="bg-white rounded-[32px] shadow-sm border border-gray-100 overflow-hidden">
                                            <div className="p-5 bg-gradient-to-r from-indigo-50 to-purple-50 flex justify-between items-center border-b border-indigo-100/50"><h3 className="font-black text-indigo-900 text-lg flex items-center gap-2">🌙 Tarde y Noche</h3></div>
                                            <div className="p-4 grid grid-cols-2 gap-3 bg-gray-50/30">{pmItems.map(item => RenderVaso({ item, isChecked: currentDayMarks.includes(item.idx) }))}</div>
                                        </div>
                                    )}
                                </div>
                            );
                        })()}
                    </div>
                </div>
            );
        }


        // ==========================================
        // 📋 MÓDULO 5: ARMADOR DE RUTINAS
        // ==========================================
        function ArmadorRutinas({ routinesMap, setRoutinesMap, db, setActiveRoutine, setSelectedEx, setActiveTab }) {
            const { useState } = React;
            const [vista, setVista] = useState('lista'); 
            const [rutinaEditando, setRutinaEditando] = useState(null); 
            const [nombreRutina, setNombreRutina] = useState('');
            const [ejerciciosRutina, setEjerciciosRutina] = useState([]); 
            const [expandedRoutine, setExpandedRoutine] = useState(null);

            // Juntamos la base maestra para poder elegir los ingredientes
            const baseMaestra = {};
            if(db && db.esposo) Object.keys(db.esposo).forEach(k => baseMaestra[k] = db.esposo[k]);
            if(db && db.esposa) Object.keys(db.esposa).forEach(k => baseMaestra[k] = db.esposa[k]);

            const guardarRutina = () => {
                if(!nombreRutina) return alert("Por favor, ponle un nombre a tu rutina (Ej: Día de Pierna)");
                if(ejerciciosRutina.length === 0) return alert("Agrega al menos un ejercicio a la rutina.");
                
                const id = rutinaEditando || 'rutina_' + Date.now();
                const nuevoMapa = { ...routinesMap };
                nuevoMapa[id] = { name: nombreRutina, exercises: ejerciciosRutina };
                
                setRoutinesMap(nuevoMapa);
                localStorage.setItem('sincroFlexRoutines_v18', JSON.stringify(nuevoMapa));
                setVista('lista');
            };

            const borrarRutina = (id, e) => {
                e.stopPropagation();
                if(!window.confirm("¿Seguro que quieres BORRAR esta rutina completa?")) return;
                const nuevoMapa = { ...routinesMap };
                delete nuevoMapa[id];
                setRoutinesMap(nuevoMapa);
                localStorage.setItem('sincroFlexRoutines_v18', JSON.stringify(nuevoMapa));
            };

            const abrirEditor = (id) => {
                setRutinaEditando(id);
                if(id) {
                    setNombreRutina(routinesMap[id].name);
                    setEjerciciosRutina([...routinesMap[id].exercises]);
                } else {
                    setNombreRutina('');
                    setEjerciciosRutina([]);
                }
                setVista('editando');
            };

            if (vista === 'editando') {
                return (
                    <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 animate-slide-up">
                        <h3 className="font-black text-lg text-gray-900 mb-4">{rutinaEditando ? '✏️ Editar Rutina' : '🆕 Nueva Rutina'}</h3>

        // ==========================================
        // 🏋️‍♂️ MÓDULO 3: GIMNASIO Y MATANZA

                function ModuloGym({ 
            setActiveModule, user, setUser, recordDate, setRecordDate, db, setDb, 
            routinesMap, setRoutinesMap, activeRoutine, setActiveRoutine, selectedEx, setSelectedEx, 
 
            globalWorkoutTime, setGlobalWorkoutTime, isWorkoutActive, setIsWorkoutActive,
            timerM, setTimerM, isActiveM, setIsActiveM, timerF, setTimerF, isActiveF, setIsActiveF,
            activarAudioIOS, reproducirAlarma, formatTime, getTargetTime,
            workoutSetsMap, setWorkoutSetsMap, rpeModal, setRpeModal, mentzerModal, setMentzerModal,

        }) {
            const { useState } = React;

            const [subTab, setSubTab] = useState('rutinas'); 
            const [expandedRoutine, setExpandedRoutine] = useState(null); 
            const [showProtocolModal, setShowProtocolModal] = useState(false);
            const [showFinishModal, setShowFinishModal] = useState(false);

            // --- FUNCIONES DEL GYM ---
            const calcularTiempoDescanso = (exData, u) => {
                if (!exData) return 0;
                if (exData.type === 'core') return 60; 
                if (exData.supersetGroup && exData.name.includes("A.")) return 0; 
                if (u === 'esposo') return exData.type === 'mentzer' ? 180 : 120;
                return 90; 
            };

            const handleFinishWorkout = async () => { 
                setIsWorkoutActive(false);
                const updatedDb = JSON.parse(JSON.stringify(db));
                if (!updatedDb.sesiones_completadas) updatedDb.sesiones_completadas = [];
                updatedDb.sesiones_completadas.push({ date: recordDate, routine: routinesMap[activeRoutine].name, durationSeconds: globalWorkoutTime });
                setDb(updatedDb);
                if (window.fsDb) { try { await window.fsUpdateDoc(window.fsDoc(window.fsDb, "usuarios", "fase2_historial"), { historial: updatedDb }); } catch (error) {} }
                setShowFinishModal(false); setGlobalWorkoutTime(0); alert("¡Matanza Terminada! Guardado con éxito.");
            };

            const updateSet = (exId, index, field, value) => { const newMap = { ...workoutSetsMap }; newMap[exId][index][field] = value; setWorkoutSetsMap(newMap); };
            
            const updateDropSet = (exId, setIndex, dropIndex, field, value) => {
                const newMap = { ...workoutSetsMap };
                newMap[exId][setIndex].drops[dropIndex][field] = value;
                setWorkoutSetsMap(newMap);
            };

            const toggleSetType = (exId, index) => { if (workoutSetsMap[exId][index].completed) return; const newMap = { ...workoutSetsMap }; newMap[exId][index].type = newMap[exId][index].type === 'normal' ? 'warmup' : 'normal'; setWorkoutSetsMap(newMap); };
            
            const addTechnique = (exId, index, techType) => { 
                if (workoutSetsMap[exId][index].completed) return; 
                const newMap = { ...workoutSetsMap }; 
                const currentSet = newMap[exId][index];
                if (techType === 'add_drop') {
                    currentSet.technique = 'drop';
                    if (!currentSet.drops) currentSet.drops = [];
                    currentSet.drops.push({ weight: '', reps: '' }); 
                } else if (techType === 'remove_drop') {
                    currentSet.drops.pop();
                    if (currentSet.drops.length === 0) currentSet.technique = null;
                } else if (techType === 'partial') {
                    currentSet.technique = currentSet.technique === 'partial' ? null : 'partial';
                }
                setWorkoutSetsMap(newMap); 
            };

            const handleSetCompletion = async (exId, index, isForceConfirm = false) => {
                const newMap = { ...workoutSetsMap }; const currentSet = newMap[exId][index]; const isNowCompleted = !currentSet.completed; const exData = db[user][exId];
                if (isNowCompleted) { for (let i = 0; i < index; i++) { if (!newMap[exId][i].completed) { alert("⚠️ ORDEN ESTRICTO: Para no desarmar tu rutina, debes completar las series en orden. Marca primero la serie de arriba."); return; } } }
                if (isNowCompleted && !isForceConfirm) {
                    if (exData.equipType === 'pesas' && currentSet.type === 'normal') {
                        if (currentSet.platesInput === '' || !currentSet.reps || !currentSet.rpe) { alert("Llena Carga, Reps y RPE de la serie principal."); return; }
                        const valRpe = parseFloat(currentSet.rpe);
                        if (exData.type === 'mentzer' && valRpe < 10) { setMentzerModal({ isOpen: true, exId, setIndex: index, type: 'mentzer' }); return; }
                        if ((exData.type === 'arnold' || exData.type === 'salva_hombros') && valRpe >= 10) { alert("⚠️ Recuerda: El método Arnold prioriza volumen y técnica. RPE 9 es ideal para proteger tu bursa. Intenta no llegar al fallo absoluto."); }
                    }
                }
                currentSet.completed = isNowCompleted; if(isForceConfirm && mentzerModal.type === 'mentzer') currentSet.rpe = 10; setWorkoutSetsMap(newMap);

                if (isNowCompleted) {
                    const updatedDb = JSON.parse(JSON.stringify(db)); if (!updatedDb[user][exId].history) updatedDb[user][exId].history = [];
                    let newRecord = { date: recordDate, setType: currentSet.type, isSubSet: false };
                    
                    if (exData.equipType === 'pesas' || exData.equipType === 'band' || exData.equipType === 'isometric') {
                        const bw = (globalBar === 'none' || globalBar === 'mancuernas') ? 0 : (globalUnit === 'kg' ? BARBELLS[globalBar].weightKg : BARBELLS[globalBar].weightLbs);
                        const rawInput = parseFloat(currentSet.platesInput) || 0;
                        newRecord.weightInput = rawInput; 
                        newRecord.weightTotal = exData.equipType === 'band' ? 0 : rawInput + bw; 
                        newRecord.weight = newRecord.weightTotal; 
                        newRecord.unit = globalUnit; newRecord.barId = globalBar; newRecord.reps = exData.equipType === 'isometric' ? currentSet.reps : parseInt(currentSet.reps); newRecord.rpe = parseFloat(currentSet.rpe) || 0; newRecord.formPerfect = currentSet.formPerfect; if(exData.equipType === 'band') newRecord.bandRes = currentSet.platesInput;
                    } else if (exData.equipType === 'cardio_z2') { newRecord.c_machine = currentSet.c_machine; newRecord.c_time = currentSet.c_time; newRecord.c_incline = currentSet.c_incline; newRecord.c_speed = currentSet.c_speed;
                    } else if (exData.equipType === 'cardio_hiit') { newRecord.h_format = currentSet.h_format; newRecord.h_rounds = currentSet.h_rounds; newRecord.h_on = currentSet.h_on; newRecord.h_off = currentSet.h_off; newRecord.h_int = currentSet.h_int;
                    } else if (exData.type === 'core') { newRecord.reps = 1; }
                    
                    updatedDb[user][exId].history.push(newRecord);

                    if (currentSet.technique === 'drop' && currentSet.drops) {
                        currentSet.drops.forEach((drop) => { updatedDb[user][exId].history.push({ date: recordDate, isSubSet: true, parentSetId: index, technique: 'drop', weight: parseFloat(drop.weight) || 0, reps: drop.reps || 0 }); });
                    } else if (currentSet.technique === 'partial') {
                        updatedDb[user][exId].history.push({ date: recordDate, isSubSet: true, parentSetId: index, technique: 'partial', weight: newRecord.weight, reps: currentSet.techReps || 0 });
                    }
                    
                    setDb(updatedDb); if (window.fsDb) { try { await window.fsUpdateDoc(window.fsDoc(window.fsDb, "usuarios", "fase2_historial"), { historial: updatedDb }); } catch (error) {} }
                    
                    const isLastExInGroup = exId === exercisesToRender[exercisesToRender.length - 1];
                    if (isLastExInGroup && currentSet.type === 'normal') {
                        const restT = calcularTiempoDescanso(exData, user);
                        if (restT > 0) { 
                            activarAudioIOS();
                            if (user === 'esposo') { setTimerM(restT); setIsActiveM(true); } 
                            else { setTimerF(restT); setIsActiveF(true); } 
                        }
                    }
                }
            };
            
            const deleteSet = async (exId, index) => {
                const currentSet = workoutSetsMap[exId][index]; 
                if (!currentSet.completed) { const newMap = { ...workoutSetsMap }; newMap[exId] = newMap[exId].filter((_, i) => i !== index); setWorkoutSetsMap(newMap); return; }
                const exSets = workoutSetsMap[exId]; for (let i = index + 1; i < exSets.length; i++) { if (exSets[i].completed) { alert("⚠️ ORDEN ESTRICTO: Solo puedes borrar la última serie que completaste para no desordenar el historial. Borra primero la de más abajo."); return; } }
                
                const updatedDb = JSON.parse(JSON.stringify(db)); let historyArray = updatedDb[user][exId].history;
                let mainCount = 0; let targetMainIdx = -1;
                for (let i = 0; i < historyArray.length; i++) {
                    if (historyArray[i].date === recordDate && !historyArray[i].isSubSet) { if (mainCount === index) { targetMainIdx = i; break; } mainCount++; }
                }
                if (targetMainIdx > -1) {
                    updatedDb[user][exId].history = historyArray.filter((h, i) => {
                        if (i === targetMainIdx) return false; 
                        if (h.date === recordDate && h.isSubSet && h.parentSetId === index) return false; 
                        return true;
                    });

                setDb(updatedDb); if (window.fsDb) { try { await window.fsUpdateDoc(window.fsDoc(window.fsDb, "usuarios", "fase2_historial"), { historial: updatedDb }); } catch (error) {} }
            };

            const addSetRow = (exId) => { const newMap = { ...workoutSetsMap }; newMap[exId] = [...newMap[exId], { id: newMap[exId].length + 1, type: 'normal', platesInput: '', reps: '', rpe: '', completed: false, formPerfect: true }]; setWorkoutSetsMap(newMap); };
            const openRpeModal = (exId, index, currentRpe, isCardio) => { if(workoutSetsMap[exId][index].completed || isCardio) return; setRpeModal({ isOpen: true, exId, setIndex: index, value: currentRpe || 8, weightInfo: `Registro de Esfuerzo` }); };
            const confirmRpe = () => { updateSet(rpeModal.exId, rpeModal.setIndex, 'rpe', rpeModal.value); setRpeModal({ isOpen: false, exId: null, setIndex: null, value: 8, weightInfo: '' }); };

            };

            return (

                    {/* Botón Burbuja (Oculto en Matanza) */}

                    {/* Modales */}
                    {showProtocolModal && ( <div className="fixed inset-0 z-50 flex flex-col justify-center items-center bg-black/80 backdrop-blur-sm p-4"><div className="bg-white w-full rounded-3xl p-6 shadow-2xl max-h-[85vh] overflow-y-auto"><h3 className="text-2xl font-black text-gray-900 mb-4 uppercase tracking-tight">📖 Protocolo Sincro</h3><div className="space-y-3 text-sm font-bold text-gray-700 mb-6"><p className="bg-gray-50 p-3 rounded-xl border">1️⃣ <span className="text-gray-900 font-black">ORDEN ESTRICTO:</span> Completa y marca las series de arriba hacia abajo.</p><p className="bg-red-50 p-3 rounded-xl border border-red-100">2️⃣ <span className="text-red-600 font-black">MENTZER:</span> 1 sola serie efectiva. FALLO ABSOLUTO.</p><p className="bg-blue-50 p-3 rounded-xl border border-blue-100">3️⃣ <span className="text-blue-600 font-black">ARNOLD:</span> Prioriza técnica. RPE 8.5 - 9.</p><p className="bg-pink-50 p-3 rounded-xl border border-pink-100">4️⃣ <span className="text-[#ff2d55] font-black">ESCULPIDO:</span> Sigue el Tempo estricto.</p></div><button onClick={() => setShowProtocolModal(false)} className="w-full bg-gray-900 text-white font-black py-4 rounded-xl shadow-lg hover:bg-gray-800">Entendido, a matar 🚀</button></div></div> )}
                    {showFinishModal && ( <div className="fixed inset-0 z-50 flex flex-col justify-center items-center bg-black/80 backdrop-blur-sm p-6"><div className="bg-white w-full rounded-3xl p-6 shadow-2xl border-4 border-[#34c759] text-center"><h3 className="text-xl font-black mb-2">Finiquitar Sesión</h3><p className="font-bold mb-6">Tiempo: {formatTime(globalWorkoutTime)}</p><button onClick={handleFinishWorkout} className="w-full bg-[#34c759] text-white font-black py-4 rounded-xl">Guardar Sesión</button></div></div> )}
                    {rpeModal.isOpen && ( <div className="fixed inset-0 z-50 flex flex-col justify-end bg-black/60 backdrop-blur-sm"><div className="bg-white w-full rounded-t-3xl pb-8 pt-6 shadow-2xl"><div className="text-center mb-6 px-6"><p className="text-6xl font-black mb-2">{rpeModal.value}</p></div><div className="flex overflow-x-auto gap-2 mb-8 px-4">{rpeValues.map(val => <button key={val} onClick={() => setRpeModal({...rpeModal, value: val})} className={`w-14 h-14 rounded-full font-bold text-lg flex-shrink-0 ${rpeModal.value === val ? 'bg-[#007aff] text-white' : 'bg-[#e5e5ea]'}`}>{val}</button>)}</div><div className="px-6"><button onClick={confirmRpe} className="w-full bg-[#34c759] text-white font-black text-xl py-4 rounded-2xl shadow-lg">Confirmar ✓</button></div></div></div> )}

                                                    <path d="M43.6 110.1C43.6 109.8 46 109.8 50 109.8C54 109.8 56.4 110.1 56.4 110.1C56.4 110.1 58.7 133.3 61.2 138C63.5 142.8 68.5 140.3 68 135C63.7 105.7 59.1 111.4 59.1 105H40.9C40.9 105 36.3 105.7 32 135C31.5 140.3 36.5 142.8 38.8 138C41.3 133.3 43.6 110.1 43.6 110.1Z" fill={colorHex} opacity={getOp(macroGrupos['Piernas'])} />
                                                </g>
                                            </svg>
                                        </div>

                                    {/* Leyenda */}
                                    <div className="flex justify-center gap-4 mt-6 border-t border-gray-50 pt-5">

                                        <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full" style={{ backgroundColor: colorHex, opacity: 0.4 }}></div><span className="text-[9px] font-black text-gray-500 uppercase tracking-widest">Activo</span></div>
                                        <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-[#e5e5ea] border border-gray-300"></div><span className="text-[9px] font-black text-gray-400 uppercase tracking-widest">Descanso</span></div>
                                    </div>
                                </div>

                                {/* Placeholder del Radar (para no sobrecargar) */}
                                <div className="bg-white p-5 rounded-[32px] shadow-sm border border-gray-100 flex flex-col items-center relative overflow-hidden">
                                    <h3 className="font-black text-sm text-gray-900 uppercase tracking-wider mb-2 self-start w-full border-b border-gray-50 pb-3">🕸️ Distribución de Matanza</h3>
                                    <p className="text-xs font-bold text-gray-400 text-center py-6">El cerebro F4 ya sumó todo. El gráfico de radar está listo para el siguiente parche quirúrgico.</p>
                                </div>

                            </div>
                        );
                    })()}

                    {/* BARRA INFERIOR */}
                    <div className="absolute bottom-0 w-full max-w-md bg-white/90 backdrop-blur-md border-t flex justify-around pb-8 pt-3 z-40">

                        <button onClick={() => setActiveTab('dashboard')} className={`w-20 ${activeTab === 'dashboard' ? 'text-[#007aff]' : 'text-gray-400'}`}><span className="text-2xl block text-center">📋</span></button>
                        <button onClick={() => setActiveTab('workout')} className={`w-20 ${activeTab === 'workout' ? 'text-[#007aff]' : 'text-gray-400'}`}><div className={`w-12 h-12 rounded-full mx-auto -mt-6 flex items-center justify-center text-white ${activeTab === 'workout' ? 'bg-[#007aff]' : 'bg-gray-800'}`}>💪</div></button>
                        <button onClick={() => setActiveTab('stats')} className={`w-20 ${activeTab === 'stats' ? 'text-[#007aff]' : 'text-gray-400'}`}><span className="text-2xl block text-center">🔥</span></button>
                    </div>
                </div>
            );
        }


        // ==========================================
        // 🏠 MÓDULO 1: EL HUB CENTRAL (MENÚ)
        // ==========================================

                                <div className="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-2xl shadow-inner">🏋️‍♂️</div>

        // ==========================================
        // 📚 GESTOR MAESTRO DE EJERCICIOS (ÉLITE MORADO + LIMPIADOR INTELIGENTE)
        // ==========================================
        function GestorEjercicios({ db, setDb }) {
            const { useState } = React;
            const [vista, setVista] = useState('lista'); 
            const [editId, setEditId] = useState(null);
            const [busqueda, setBusqueda] = useState(''); 
            
            const [nuevoNom, setNuevoNom] = useState('');
            const [nuevaCat, setNuevaCat] = useState('Fuerza');
            const [nuevoMusculo, setNuevoMusculo] = useState('Pecho Superior');
            const [nuevoSecundarios, setNuevoSecundarios] = useState([]); 
            const [nuevoEstabilizadores, setNuevoEstabilizadores] = useState([]); 

            // --- ESTADOS DEL LIMPIADOR INTELIGENTE ---
            const [mostrarLimpiador, setMostrarLimpiador] = useState(false);
            const [pestañaLimpieza, setPestañaLimpieza] = useState('historial'); // Por defecto limpiamos datos
            const [aBorrarEjs, setABorrarEjs] = useState([]); 
            const [aBorrarHistorial, setABorrarHistorial] = useState([]); 

            const categorias = ["Fuerza", "Cardio", "Core", "Rehabilitación"];
            const musculos = ["Pecho Superior", "Pecho Medio", "Pecho Inferior", "Espalda Sup.", "Dorsales", "Espalda Baja", "Trapecios", "Hombro Anterior", "Hombro Lateral", "Hombro Posterior", "Bíceps", "Tríceps (Cabeza Larga)", "Tríceps (Lateral/Medial)", "Antebrazos", "Cuádriceps", "Isquiotibiales", "Glúteo Mayor", "Glúteo Medio", "Aductores", "Gemelos", "Sóleo", "Abdominales (Recto)", "Oblicuos", "Core (Transverso)", "Cardio/Sistémico", "Movilidad"];

            const todosLosEjercicios = {};
            if(db && db.esposo) Object.keys(db.esposo).forEach(k => { if(db.esposo[k].name) todosLosEjercicios[k] = db.esposo[k] });

            // Solo ejercicios que tengan datos guardados (pesos, reps)
            const ejsConHistorial = Object.values(todosLosEjercicios).filter(ex => ex.history && ex.history.length > 0);

            const toggleMusculo = (lista, setLista, m) => {
                if(lista.includes(m)) setLista(lista.filter(x => x !== m));
                else setLista([...lista, m]);
            };

            // SELECCIÓN ARREGLADA (Sin conflictos)
            const toggleBorrado = (lista, setLista, id) => {
                if(lista.includes(id)) setLista(lista.filter(x => x !== id));
                else setLista([...lista, id]);
            };

            const seleccionarTodosEjs = () => {
                if(aBorrarEjs.length === Object.keys(todosLosEjercicios).length) setABorrarEjs([]); 
                else setABorrarEjs(Object.keys(todosLosEjercicios)); 
            };

            const seleccionarTodoHistorial = () => {
                if(aBorrarHistorial.length === ejsConHistorial.length) setABorrarHistorial([]);
                else setABorrarHistorial(ejsConHistorial.map(ex => ex.id));
            };

            const ejecutarLimpiezaMaestra = async () => {
                const total = aBorrarEjs.length + aBorrarHistorial.length;
                if(total === 0) return alert("No has seleccionado nada para borrar.");
                if(!window.confirm(`¿Seguro que quieres limpiar los datos de estos ${total} elementos?`)) return;

                const updatedDb = JSON.parse(JSON.stringify(db));
                
                // 1. Borrar Ejercicios Completos (Si eligió esa pestaña)
                aBorrarEjs.forEach(id => {
                    if(updatedDb.esposo && updatedDb.esposo[id]) delete updatedDb.esposo[id];
                    if(updatedDb.esposa && updatedDb.esposa[id]) delete updatedDb.esposa[id];
                });

                // 2. Borrar Solo los Datos/Pesos (Si eligió la pestaña de historial)
                aBorrarHistorial.forEach(exId => {
                    ['esposo', 'esposa'].forEach(u => {
                        if(updatedDb[u] && updatedDb[u][exId]) {
                            updatedDb[u][exId].history = []; // Vacía los pesos, reps y RPE a cero
                        }
                    });
                });

                setDb(updatedDb);
                if (window.fsDb) { try { await window.fsUpdateDoc(window.fsDoc(window.fsDb, "usuarios", "fase2_historial"), { historial: updatedDb }); } catch (error) {} }
                
                setMostrarLimpiador(false); setABorrarEjs([]); setABorrarHistorial([]);
                alert("🧹 Limpieza completada. Datos basura eliminados.");
            };

            const guardarEjercicio = async () => {
                if (!nuevoNom) return alert("Ponle un nombre al ejercicio.");
                const idGenerado = editId ? editId : nuevoNom.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
                const updatedDb = JSON.parse(JSON.stringify(db));
                
                const baseEj = editId && updatedDb.esposo[idGenerado] ? updatedDb.esposo[idGenerado] : { id: idGenerado, type: 'metabolico', equipType: 'pesas', warmupSets: 0, targetSets: 3, targetRepsObj: '10', tempo: '2-0-2-0', history: [] };

                const ejActualizado = { 
                    ...baseEj, name: nuevoNom, categoria: nuevaCat, musculo_primario: nuevoMusculo,
                    biomecanica: { primario: nuevoMusculo, secundarios: nuevoSecundarios, estabilizadores: nuevoEstabilizadores }
                };

                ['esposo', 'esposa'].forEach(u => { if(!updatedDb[u]) updatedDb[u] = {}; updatedDb[u][idGenerado] = ejActualizado; });

                setDb(updatedDb);
                if (window.fsDb) { try { await window.fsUpdateDoc(window.fsDoc(window.fsDb, "usuarios", "fase2_historial"), { historial: updatedDb }); } catch (error) {} }
                setVista('lista'); setNuevoNom(''); setEditId(null); setNuevoSecundarios([]); setNuevoEstabilizadores([]);
            };

            return (
                <div className="animate-slide-up pb-20 mt-4 relative">
                    
                    {/* --- MODAL DEL LIMPIADOR INTELIGENTE (PORTAL MÁGICO) --- */}
                    {mostrarLimpiador && ReactDOM.createPortal(
                        <div className="fixed inset-0 z-[9999] bg-black/80 backdrop-blur-sm flex flex-col justify-end overflow-hidden">
                            <div className="bg-white w-full rounded-t-[32px] pb-8 pt-6 px-5 max-h-[90vh] flex flex-col shadow-2xl animate-slide-up">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-black text-2xl text-red-600 tracking-tight">🧹 Limpiador</h3>
                                    <button onClick={() => setMostrarLimpiador(false)} className="bg-gray-100 text-gray-500 w-8 h-8 rounded-full font-black text-sm active:scale-90 transition-transform">✕</button>
                                </div>

                                <div className="flex bg-gray-100 rounded-xl p-1 mb-4">
                                    <button onClick={()=>setPestañaLimpieza('historial')} className={`flex-1 py-2.5 text-[10px] font-black uppercase rounded-lg transition-colors ${pestañaLimpieza==='historial'?'bg-white text-red-600 shadow-sm':'text-gray-500'}`}>Datos/Pesos</button>
                                    <button onClick={()=>setPestañaLimpieza('ejercicios')} className={`flex-1 py-2.5 text-[10px] font-black uppercase rounded-lg transition-colors ${pestañaLimpieza==='ejercicios'?'bg-white text-red-600 shadow-sm':'text-gray-500'}`}>Ejercicios</button>
                                </div>

                                <div className="flex-1 overflow-y-auto mb-4 border border-gray-100 rounded-2xl bg-gray-50 p-3 hide-scrollbar">
                                    
                                    {pestañaLimpieza === 'historial' && (
                                        <>
                                            <p className="text-[10px] font-bold text-gray-500 mb-3 leading-tight">Selecciona los ejercicios para borrarles sus datos de prueba (pesos, reps). El ejercicio NO se borrará de tu base.</p>
                                            <button onClick={seleccionarTodoHistorial} className="w-full text-left py-2 px-2 text-[10px] font-black text-blue-600 uppercase tracking-widest mb-2 border-b border-gray-200">
                                                {aBorrarHistorial.length === ejsConHistorial.length && ejsConHistorial.length > 0 ? 'Desmarcar Todos' : 'Marcar Todos'}
                                            </button>
                                            
                                            {ejsConHistorial.length === 0 && <p className="text-xs text-gray-400 text-center py-4">No hay datos de prueba guardados.</p>}
                                            
                                            <div className="space-y-4">
                                                {categorias.map(cat => {
                                                    const ejsCat = ejsConHistorial.filter(e => (e.categoria === cat || (!e.categoria && cat === 'Fuerza')));
                                                    if(ejsCat.length === 0) return null;
                                                    return (
                                                        <div key={cat}>
                                                            <h4 className="text-[10px] font-black text-purple-600 mb-1 uppercase tracking-widest">{cat}</h4>
                                                            <div className="space-y-1">
                                                                {ejsCat.map(ex => (
                                                                    <div key={ex.id} onClick={() => toggleBorrado(aBorrarHistorial, setABorrarHistorial, ex.id)} className={`flex items-center gap-3 p-3 rounded-xl border cursor-pointer transition-colors ${aBorrarHistorial.includes(ex.id) ? 'bg-red-50 border-red-200' : 'bg-white border-transparent shadow-sm'}`}>
                                                                        <div className={`w-5 h-5 rounded border flex items-center justify-center ${aBorrarHistorial.includes(ex.id) ? 'bg-red-500 border-red-500 text-white' : 'bg-white border-gray-300'}`}>
                                                                            {aBorrarHistorial.includes(ex.id) && <span className="text-[10px] font-black">✓</span>}
                                                                        </div>
                                                                        <div className="flex flex-col">
                                                                            <span className={`text-xs font-bold ${aBorrarHistorial.includes(ex.id) ? 'text-red-900 line-through opacity-70' : 'text-gray-800'}`}>{ex.name.replace(/^\d+[a-zA-Z]?\.\s*/, '')}</span>
                                                                            <span className="text-[9px] text-gray-400 font-bold">{ex.history.length} registros guardados</span>
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        </>
                                    )}

                                    {pestañaLimpieza === 'ejercicios' && (
                                        <>
                                            <p className="text-[10px] font-bold text-gray-500 mb-3 leading-tight">Borra el ejercicio por completo (desaparecerá de la Base Maestra).</p>
                                            <button onClick={seleccionarTodosEjs} className="w-full text-left py-2 px-2 text-[10px] font-black text-blue-600 uppercase tracking-widest mb-2 border-b border-gray-200">
                                                {aBorrarEjs.length === Object.keys(todosLosEjercicios).length ? 'Desmarcar Todos' : 'Marcar Todos'}
                                            </button>
                                            <div className="space-y-1">
                                                {Object.values(todosLosEjercicios).sort((a,b) => a.name.localeCompare(b.name)).map(ex => (
                                                    <div key={ex.id} onClick={() => toggleBorrado(aBorrarEjs, setABorrarEjs, ex.id)} className={`flex items-center gap-3 p-3 rounded-xl border cursor-pointer transition-colors ${aBorrarEjs.includes(ex.id) ? 'bg-red-50 border-red-200' : 'bg-white border-transparent shadow-sm'}`}>
                                                        <div className={`w-5 h-5 rounded border flex items-center justify-center ${aBorrarEjs.includes(ex.id) ? 'bg-red-500 border-red-500 text-white' : 'bg-white border-gray-300'}`}>
                                                            {aBorrarEjs.includes(ex.id) && <span className="text-[10px] font-black">✓</span>}
                                                        </div>
                                                        <span className={`text-xs font-bold ${aBorrarEjs.includes(ex.id) ? 'text-red-900 line-through opacity-70' : 'text-gray-800'}`}>{ex.name.replace(/^\d+[a-zA-Z]?\.\s*/, '')}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </>
                                    )}
                                </div>

                                <button onClick={ejecutarLimpiezaMaestra} className={`w-full py-4 rounded-2xl font-black text-sm uppercase tracking-wider transition-all ${aBorrarEjs.length > 0 || aBorrarHistorial.length > 0 ? 'bg-red-600 text-white shadow-lg shadow-red-200 active:scale-95' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                                    🗑️ Eliminar ({pestañaLimpieza === 'historial' ? aBorrarHistorial.length : aBorrarEjs.length})
                                </button>
                            </div>
                        </div>,
                        document.body
                    )}
                    {/* --- FIN DEL MODAL --- */}


                    {vista === 'lista' ? (
                        <>
                            {/* BOTONERA PRINCIPAL */}
                            <div className="flex gap-2 mb-3">
                                <button onClick={() => { setEditId(null); setNuevoNom(''); setNuevoSecundarios([]); setNuevoEstabilizadores([]); setVista('nuevo'); }} className="flex-[2] bg-purple-600 text-white font-black py-3 rounded-xl shadow-sm uppercase text-[10px] active:scale-95 transition-transform">➕ Crear Nuevo</button>
                                <button onClick={() => setMostrarLimpiador(true)} className="flex-1 bg-white border border-red-200 text-red-600 font-black py-3 rounded-xl shadow-sm uppercase text-[10px] active:scale-95 transition-transform hover:bg-red-50">🧹 Limpiar</button>
                            </div>

                            {/* BUSCADOR */}
                            <div className="relative mb-6">
                                <span className="absolute left-3 top-3 text-gray-400">🔍</span>
                                <input type="text" placeholder="Buscar ejercicio..." value={busqueda} onChange={e => setBusqueda(e.target.value)} className="w-full bg-white border border-purple-200 rounded-xl p-3 pl-10 font-bold text-sm text-purple-900 outline-none shadow-sm focus:border-purple-500 transition-colors" />
                            </div>

                            {categorias.map(cat => {
                                const ejsEnCat = Object.values(todosLosEjercicios).filter(e => (e.categoria === cat || (!e.categoria && cat === 'Fuerza')) && e.name.toLowerCase().includes(busqueda.toLowerCase()));
                                if (ejsEnCat.length === 0) return null;
                                return (
                                    <div key={cat} className="mb-6">
                                        <h3 className="font-black text-purple-600 mb-3 uppercase tracking-[2px] text-[11px] border-b border-purple-100 pb-1">{cat}</h3>
                                        <div className="space-y-3">
                                            {ejsEnCat.map(data => {
                                                const bio = data.biomecanica || { primario: data.musculo_primario, secundarios: [], estabilizadores: [] };
                                                return (
                                                    <div key={data.id} className="bg-white p-3 rounded-xl border border-purple-100 flex flex-col shadow-sm">
                                                        <div className="flex justify-between items-start w-full">
                                                            <h4 className="font-black text-sm text-gray-900">{data.name.replace(/^\d+[a-zA-Z]?\.\s*/, '')}</h4>
                                                            <button onClick={() => {
                                                                setEditId(data.id); setNuevoNom(data.name.replace(/^\d+[a-zA-Z]?\.\s*/, ''));
                                                                setNuevoMusculo(data.musculo_primario || 'Pecho Medio'); setNuevaCat(data.categoria || 'Fuerza');
                                                                setNuevoSecundarios(bio.secundarios || []); setNuevoEstabilizadores(bio.estabilizadores || []);
                                                                setVista('editando');
                                                            }} className="text-[10px] font-black uppercase text-purple-600 bg-purple-50 px-3 py-1 rounded-lg hover:bg-purple-100 transition-colors">Editar</button>
                                                        </div>
                                                        <div className="mt-2 flex flex-col gap-1">
                                                            <span className="text-[9px] bg-red-50 text-red-600 px-2 py-0.5 rounded font-black tracking-wider w-fit">🔴 MOTOR: {bio.primario || 'Sin asignar'}</span>
                                                            {bio.secundarios && bio.secundarios.length > 0 && <span className="text-[8px] bg-orange-50 text-orange-600 px-2 py-0.5 rounded font-bold tracking-wider w-fit">🟠 SINERGISTAS: {bio.secundarios.join(', ')}</span>}
                                                            {bio.estabilizadores && bio.estabilizadores.length > 0 && <span className="text-[8px] bg-yellow-50 text-yellow-700 px-2 py-0.5 rounded font-bold tracking-wider w-fit">🟡 ESTAB: {bio.estabilizadores.join(', ')}</span>}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                        </>
                    ) : (
                        <div className="bg-white p-5 rounded-3xl shadow-lg border border-purple-200 mt-2 animate-slide-up">
                            <h3 className="font-black text-lg text-purple-900 mb-4">{editId ? '✏️ Editar Biomecánica' : '🆕 Crear Ejercicio'}</h3>
                            
                            <label className="block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-widest">Nombre del Ejercicio</label>
                            <input type="text" value={nuevoNom} onChange={e => setNuevoNom(e.target.value)} className="w-full bg-gray-50 border border-purple-200 rounded-xl p-3 font-black text-purple-900 mb-4 outline-none focus:bg-white transition-colors" />
                            
                            <label className="block text-[10px] font-black text-gray-400 mb-1 uppercase tracking-widest">Categoría</label>
                            <div className="grid grid-cols-2 gap-2 mb-4">

          const [showFinishModal, setShowFinishModal] = useState(false);

          useEffect(() => {
              const cargarBaseDeDatos = async () => {

                      const docRef = window.fsDoc(window.fsDb, "usuarios", "fase2_historial");

                  } catch (error) {

                  } finally { setIsDbLoading(false); }

          useEffect(() => { if(db) localStorage.setItem('sincroFlexDb_v18', JSON.stringify(db)); }, [db]);
