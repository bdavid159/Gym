          const [globalUnit, setGlobalUnit] = useState('kg'); 
          const [globalBar, setGlobalBar] = useState('none'); 
          
          const [timerM, setTimerM] = useState(180); const [isActiveM, setIsActiveM] = useState(false);
          const [timerF, setTimerF] = useState(90); const [isActiveF, setIsActiveF] = useState(false);


          const [workoutSetsMap, setWorkoutSetsMap] = useState({});
          const [rpeModal, setRpeModal] = useState({ isOpen: false, exId: null, setIndex: null, value: 8, weightInfo: '' });
          const [mentzerModal, setMentzerModal] = useState({ isOpen: false, exId: null, setIndex: null, type: 'mentzer' }); 

          const audioCtxRef = useRef(null);

          const activarAudioIOS = () => {
              if (!audioCtxRef.current) {
                  const Ctx = window.AudioContext || window.webkitAudioContext;
                  audioCtxRef.current = new Ctx();
              }
              if (audioCtxRef.current.state === 'suspended') {
                  audioCtxRef.current.resume();
              }
          };

          const reproducirAlarma = () => { 
              if (!audioCtxRef.current) return;
              
              // 1. Intentar vibrar (Bloqueado por Apple en iOS, pero funciona excelente en Android)
              if ("vibrate" in navigator) {
                  navigator.vibrate([400, 200, 400, 200, 400]); 
              }

              // 2. Crear una alarma de TRIPLE pitido fuerte
              const ctx = audioCtxRef.current;
              const now = ctx.currentTime;
              
              const playBeep = (startTime) => {
                  const osc = ctx.createOscillator();
                  const gainNode = ctx.createGain();
                  osc.connect(gainNode);
                  gainNode.connect(ctx.destination);
                  
                  osc.type = 'square'; // Tono estridente tipo despertador digital
                  osc.frequency.setValueAtTime(700, startTime); 
                  
                  gainNode.gain.setValueAtTime(1, startTime);
                  gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.4); 
                  
                  osc.start(startTime);
                  osc.stop(startTime + 0.4);
              };

              // Disparamos 3 pitidos con medio segundo de separación
              playBeep(now);
              playBeep(now + 0.5);
              playBeep(now + 1.0);
          };


          useEffect(() => { let timer = null; if (isWorkoutActive) timer = setInterval(() => setGlobalWorkoutTime(t => t + 1), 1000); return () => clearInterval(timer); }, [isWorkoutActive]);
          useEffect(() => { let i = null; if (isActiveM && timerM > 0) i = setInterval(() => setTimerM(t => t - 1), 1000); else if (timerM === 0 && isActiveM) { setIsActiveM(false); reproducirAlarma(); } return () => clearInterval(i); }, [isActiveM, timerM]);
          useEffect(() => { let i = null; if (isActiveF && timerF > 0) i = setInterval(() => setTimerF(t => t - 1), 1000); else if (timerF === 0 && isActiveF) { setIsActiveF(false); reproducirAlarma(); } return () => clearInterval(i); }, [isActiveF, timerF]);




          useEffect(() => {
              if ("Notification" in window && Notification.permission === "default") {
                  Notification.requestPermission();
              }
          }, []);

          
          const formatTime = (s) => { const m = Math.floor(s/60); const sec = (s%60).toString().padStart(2,'0'); return `${m}:${sec}`; };

          const getTargetTime = () => activeRoutine.includes('AM') ? '1h 15m' : '1h 00m';

          const calcularTiempoDescanso = (exData, u) => {
              if (!exData) return 0;
              if (exData.type === 'core') return 60; 
              if (exData.supersetGroup && exData.name.includes("A.")) return 0; 
              if (u === 'esposo') return exData.type === 'mentzer' ? 180 : 120;
              return 90; 
          };

          const resetTimerM = (time = 180) => { setIsActiveM(false); setTimerM(time); };
          const resetTimerF = (time = 90) => { setIsActiveF(false); setTimerF(time); };

          const handleFinishWorkout = async () => { 
              setIsWorkoutActive(false);
              const updatedDb = JSON.parse(JSON.stringify(db));
              if (!updatedDb.sesiones_completadas) updatedDb.sesiones_completadas = [];
              updatedDb.sesiones_completadas.push({ date: recordDate, routine: routinesMap[activeRoutine].name, durationSeconds: globalWorkoutTime });
              setDb(updatedDb);
              if (window.fsDb) { try { await window.fsUpdateDoc(window.fsDoc(window.fsDb, "usuarios", "fase2_historial"), { historial: updatedDb }); } catch (error) {} }
              setShowFinishModal(false); setGlobalWorkoutTime(0); alert("¡Matanza Terminada! Guardado con éxito.");
          };

          useEffect(() => {
              const now = new Date(); const day = now.getDay(); const hour = now.getHours();
              let detectedRoutine = "LUN_AM"; 
              if (day === 0 || day === 6) detectedRoutine = "LUN_AM"; 
              else if (hour >= 15) {
                  if (day === 1 || day === 2) detectedRoutine = "LUN_MAR_PM"; else if (day === 3) detectedRoutine = "MIE_PM"; else if (day === 4) detectedRoutine = "JUE_PM"; else detectedRoutine = "VIE_PM";
              } else {
                  if (day === 1) detectedRoutine = "LUN_AM"; if (day === 2) detectedRoutine = "MAR_AM"; if (day === 3) detectedRoutine = "MIE_AM"; if (day === 4) detectedRoutine = "JUE_AM"; if (day === 5) detectedRoutine = "VIE_PM";
              }
              setActiveRoutine(detectedRoutine);
              const exList = routinesMap[detectedRoutine]?.exercises || []; if (exList.length > 0) setSelectedEx(exList[0]);
          }, []);

          const currentExDataOriginal = db ? db[user][selectedEx] : null;
          let exercisesToRender = [];
          if (currentExDataOriginal && currentExDataOriginal.type !== 'descanso') {
              if (currentExDataOriginal.supersetGroup) { exercisesToRender = routinesMap[activeRoutine].exercises.filter(id => db[user][id]?.supersetGroup === currentExDataOriginal.supersetGroup); } else { exercisesToRender = [selectedEx]; }
          }

          useEffect(() => {
            if (!db || exercisesToRender.length === 0) { setWorkoutSetsMap({}); return; }
            setWorkoutSetsMap(prevMap => {
                const newMap = {};
                exercisesToRender.forEach(exId => {
                    const exData = db[user][exId]; if (!exData) return;
                    const todaysHistory = exData.history ? exData.history.filter(h => h.date === recordDate && !h.isSubSet) : [];
                    const warmups = exData.warmupSets || 0; const working = exData.targetSets || 0; const minSets = working > 0 ? working : 1;
                    const totalSeries = Math.max((warmups + working), todaysHistory.length > 0 ? todaysHistory.length : minSets);
                    
                    let preloadedReps = '';
                    if(exData.targetRepsObj && !exData.targetRepsObj.includes('Fallo') && !exData.targetRepsObj.includes('Circuito') && !exData.targetRepsObj.includes('m') && !exData.targetRepsObj.includes('s')) {
                        const match = exData.targetRepsObj.match(/(\d+)(?:\/p)?$/); if(match) preloadedReps = match[1];
                    }
                    if(exData.targetRepsObj === 'Fallo') preloadedReps = '1';

                    const newSets = [];
                                        todaysHistory.forEach((record, index) => {
                        let savedPlates = record.weightInput !== undefined ? record.weightInput : record.weight;
                        if(record.weightInput === undefined && record.barId !== 'none' && record.barId !== 'mancuernas') {
                            const savedBarWeight = BARBELLS[record.barId] ? (record.unit === 'kg' ? BARBELLS[record.barId].weightKg : BARBELLS[record.barId].weightLbs) : 0;
                            savedPlates = record.weight - savedBarWeight;
                        }

                        const subSetsHistory = (exData.history || []).filter(h => h.date === recordDate && h.isSubSet && h.parentSetId === index);
                        const hasDrop = subSetsHistory.some(h => h.technique === 'drop');
                        const hasPartial = subSetsHistory.some(h => h.technique === 'partial');
                        let drops = []; let techReps = ''; let technique = null;
                        if (hasDrop) { technique = 'drop'; drops = subSetsHistory.filter(h => h.technique === 'drop').map(h => ({ weight: h.weight, reps: h.reps })); } 
                        else if (hasPartial) { technique = 'partial'; techReps = subSetsHistory.find(h => h.technique === 'partial').reps; }

                        newSets.push({ id: index + 1, type: record.setType, completed: true, formPerfect: record.formPerfect, platesInput: exData.equipType === 'band' ? record.bandRes : savedPlates, reps: record.reps, rpe: record.rpe, technique: technique, techReps: techReps, drops: drops, c_machine: record.c_machine || '', c_time: record.c_time || '', c_incline: record.c_incline || '', c_speed: record.c_speed || '', h_format: record.h_format || '', h_rounds: record.h_rounds || '', h_on: record.h_on || '', h_off: record.h_off || '', h_int: record.h_int || '' });
                    });

                    for (let i = todaysHistory.length; i < totalSeries; i++) {
                        const prevSet = prevMap[exId]?.[i];
                        if (prevSet && !prevSet.completed) {
                            newSets.push(prevSet);
                        } else {
                            newSets.push({ id: i + 1, type: i < warmups ? 'warmup' : 'normal', completed: false, formPerfect: true, platesInput: exData.equipType === 'band' ? 'Corporal' : '', reps: exData.equipType === 'cardio_z2' || exData.type === 'core' ? '' : preloadedReps, rpe: '', technique: null, techReps: '', drops: [], c_machine: 'Caminadora', c_time: exData.equipType === 'cardio_z2' ? preloadedReps : '', c_incline: '', c_speed: '', h_format: 'Bici Sprint', h_rounds: exData.equipType === 'cardio_hiit' ? '10' : '', h_on: '', h_off: '', h_int: '' });
                        }
                    }
                    newMap[exId] = newSets;
                });
                return newMap;
            });
          }, [user, selectedEx, activeRoutine, db, recordDate]);

          const updateSet = (exId, index, field, value) => { const newMap = { ...workoutSetsMap }; newMap[exId][index][field] = value; setWorkoutSetsMap(newMap); };
          
          const updateDropSet = (exId, setIndex, dropIndex, field, value) => {
              const newMap = { ...workoutSetsMap };
              newMap[exId][setIndex].drops[dropIndex][field] = value;
              setWorkoutSetsMap(newMap);
          };

          const toggleSetType = (exId, index) => { if (workoutSetsMap[exId][index].completed) return; const newMap = { ...workoutSetsMap }; newMap[exId][index].type = newMap[exId][index].type === 'normal' ? 'warmup' : 'normal'; setWorkoutSetsMap(newMap); };
          
          const addTechnique = (exId, index, techType) => { 
              if (workoutSetsMap[exId][index].completed) return; 
              const newMap = { ...workoutSetsMap }; 
              const currentSet = newMap[exId][index];

              if (techType === 'add_drop') {
                  currentSet.technique = 'drop';
                  if (!currentSet.drops) currentSet.drops = [];
                  currentSet.drops.push({ weight: '', reps: '' }); 
              } else if (techType === 'remove_drop') {
                  currentSet.drops.pop();
                  if (currentSet.drops.length === 0) currentSet.technique = null;
              } else if (techType === 'partial') {
                  currentSet.technique = currentSet.technique === 'partial' ? null : 'partial';
              }
              setWorkoutSetsMap(newMap); 
          };

          const handleSetCompletion = async (exId, index, isForceConfirm = false) => {
            const newMap = { ...workoutSetsMap }; const currentSet = newMap[exId][index]; const isNowCompleted = !currentSet.completed; const exData = db[user][exId];
            
            if (isNowCompleted) { for (let i = 0; i < index; i++) { if (!newMap[exId][i].completed) { alert("⚠️ ORDEN ESTRICTO: Para no desarmar tu rutina, debes completar las series en orden. Marca primero la serie de arriba."); return; } } }
            
            if (isNowCompleted && !isForceConfirm) {
                if (exData.equipType === 'pesas' && currentSet.type === 'normal') {
                    if (currentSet.platesInput === '' || !currentSet.reps || !currentSet.rpe) { alert("Llena Carga, Reps y RPE de la serie principal."); return; }
                    const valRpe = parseFloat(currentSet.rpe);
                    if (exData.type === 'mentzer' && valRpe < 10) { setMentzerModal({ isOpen: true, exId, setIndex: index, type: 'mentzer' }); return; }
                    if ((exData.type === 'arnold' || exData.type === 'salva_hombros') && valRpe >= 10) { alert("⚠️ Recuerda: El método Arnold prioriza volumen y técnica. RPE 9 es ideal para proteger tu bursa. Intenta no llegar al fallo absoluto."); }
                }
            }
            currentSet.completed = isNowCompleted; if(isForceConfirm && mentzerModal.type === 'mentzer') currentSet.rpe = 10; setWorkoutSetsMap(newMap);

            if (isNowCompleted) {
                const updatedDb = JSON.parse(JSON.stringify(db)); if (!updatedDb[user][exId].history) updatedDb[user][exId].history = [];
                let newRecord = { date: recordDate, setType: currentSet.type, isSubSet: false };
                
                if (exData.equipType === 'pesas' || exData.equipType === 'band' || exData.equipType === 'isometric') {
                    const bw = (globalBar === 'none' || globalBar === 'mancuernas') ? 0 : (globalUnit === 'kg' ? BARBELLS[globalBar].weightKg : BARBELLS[globalBar].weightLbs);
                    const rawInput = parseFloat(currentSet.platesInput) || 0;
                    newRecord.weightInput = rawInput; 
                    newRecord.weightTotal = exData.equipType === 'band' ? 0 : rawInput + bw; 
                    newRecord.weight = newRecord.weightTotal; // Mantenemos weight para compatibilidad con gráficos viejos
                    newRecord.unit = globalUnit; newRecord.barId = globalBar; newRecord.reps = exData.equipType === 'isometric' ? currentSet.reps : parseInt(currentSet.reps); newRecord.rpe = parseFloat(currentSet.rpe) || 0; newRecord.formPerfect = currentSet.formPerfect; if(exData.equipType === 'band') newRecord.bandRes = currentSet.platesInput;
                } else if (exData.equipType === 'cardio_z2') { newRecord.c_machine = currentSet.c_machine; newRecord.c_time = currentSet.c_time; newRecord.c_incline = currentSet.c_incline; newRecord.c_speed = currentSet.c_speed;
                } else if (exData.equipType === 'cardio_hiit') { newRecord.h_format = currentSet.h_format; newRecord.h_rounds = currentSet.h_rounds; newRecord.h_on = currentSet.h_on; newRecord.h_off = currentSet.h_off; newRecord.h_int = currentSet.h_int;
                } else if (exData.type === 'core') { newRecord.reps = 1; }
                
                updatedDb[user][exId].history.push(newRecord);


                if (currentSet.technique === 'drop' && currentSet.drops) {
                    currentSet.drops.forEach((drop) => {
                        updatedDb[user][exId].history.push({ date: recordDate, isSubSet: true, parentSetId: index, technique: 'drop', weight: parseFloat(drop.weight) || 0, reps: drop.reps || 0 });
                    });
                } else if (currentSet.technique === 'partial') {
                    updatedDb[user][exId].history.push({ date: recordDate, isSubSet: true, parentSetId: index, technique: 'partial', weight: newRecord.weight, reps: currentSet.techReps || 0 });
                }
                
                setDb(updatedDb); if (window.fsDb) { try { await window.fsUpdateDoc(window.fsDoc(window.fsDb, "usuarios", "fase2_historial"), { historial: updatedDb }); } catch (error) {} }
                
                const isLastExInGroup = exId === exercisesToRender[exercisesToRender.length - 1];
                if (isLastExInGroup && currentSet.type === 'normal') {
                    const restT = calcularTiempoDescanso(exData, user);
                    if (restT > 0) { 
                        activarAudioIOS();
                        if (user === 'esposo') { setTimerM(restT); setIsActiveM(true); } 
                        else { setTimerF(restT); setIsActiveF(true); } 
                    }
                }

            }
          };
          
                    const deleteSet = async (exId, index) => {
              const currentSet = workoutSetsMap[exId][index]; 
              
              // Si la serie NO está completada (ej. se añadió por error), la borramos solo de la pantalla
              if (!currentSet.completed) {
                  const newMap = { ...workoutSetsMap };
                  newMap[exId] = newMap[exId].filter((_, i) => i !== index);
                  setWorkoutSetsMap(newMap);
                  return;
              }
              
              const exSets = workoutSetsMap[exId]; for (let i = index + 1; i < exSets.length; i++) { if (exSets[i].completed) { alert("⚠️ ORDEN ESTRICTO: Solo puedes borrar la última serie que completaste para no desordenar el historial. Borra primero la de más abajo."); return; } }
              
              const updatedDb = JSON.parse(JSON.stringify(db)); let historyArray = updatedDb[user][exId].history;

              
              let mainCount = 0; let targetMainIdx = -1;
              for (let i = 0; i < historyArray.length; i++) {
                  if (historyArray[i].date === recordDate && !historyArray[i].isSubSet) {
                      if (mainCount === index) { targetMainIdx = i; break; }
                      mainCount++;
                  }
              }
              if (targetMainIdx > -1) {
                  updatedDb[user][exId].history = historyArray.filter((h, i) => {
                      if (i === targetMainIdx) return false; 
                      if (h.date === recordDate && h.isSubSet && h.parentSetId === index) return false; 
                      return true;
                  });
              }
              setDb(updatedDb); if (window.fsDb) { try { await window.fsUpdateDoc(window.fsDoc(window.fsDb, "usuarios", "fase2_historial"), { historial: updatedDb }); } catch (error) {} }
          };

          const addSetRow = (exId) => { const newMap = { ...workoutSetsMap }; newMap[exId] = [...newMap[exId], { id: newMap[exId].length + 1, type: 'normal', platesInput: '', reps: '', rpe: '', completed: false, formPerfect: true }]; setWorkoutSetsMap(newMap); };
          const openRpeModal = (exId, index, currentRpe, isCardio) => { if(workoutSetsMap[exId][index].completed || isCardio) return; setRpeModal({ isOpen: true, exId, setIndex: index, value: currentRpe || 8, weightInfo: `Registro de Esfuerzo` }); };
          const confirmRpe = () => { updateSet(rpeModal.exId, rpeModal.setIndex, 'rpe', rpeModal.value); setRpeModal({ isOpen: false, exId: null, setIndex: null, value: 8, weightInfo: '' }); };
                    const borrarEjercicioHistorial = async (fecha, usuario, exId, e) => {
              e.stopPropagation();
              if(!window.confirm(`¿Seguro que quieres borrar los datos de este ejercicio del día ${fecha}?`)) return;
              const updatedDb = JSON.parse(JSON.stringify(db));
              if (updatedDb[usuario][exId] && updatedDb[usuario][exId].history) {
                  updatedDb[usuario][exId].history = updatedDb[usuario][exId].history.filter(h => h.date !== fecha);
              }
              setDb(updatedDb); 
              if (window.fsDb) { try { await window.fsUpdateDoc(window.fsDoc(window.fsDb, "usuarios", "fase2_historial"), { historial: updatedDb }); } catch (error) {} }
          };


          if (isDbLoading) return (<div className="min-h-screen bg-[#f2f2f7] flex flex-col items-center justify-center"><div className="w-12 h-12 border-4 border-[#007aff] border-t-transparent rounded-full animate-spin mb-4"></div><h2 className="text-gray-800 font-bold">Sincronizando SincroFlex...</h2></div>);

          return (
            <div className="h-[100dvh] w-full flex justify-center bg-[#1c1c1e] overflow-hidden">
              <div className="w-full max-w-md bg-[#f2f2f7] shadow-2xl flex flex-col h-full relative overflow-hidden">

                
                {/* --- MÓDULO HUB CENTRAL --- */}
                {activeModule === 'hub' && <ModuloHub setActiveModule={setActiveModule} />}

                {/* --- MÓDULO HIDRATACIÓN --- */}
                {activeModule === 'agua' && (
                    <ModuloAgua 
                        setActiveModule={setActiveModule} user={user} setUser={setUser} 
                        recordDate={recordDate} setRecordDate={setRecordDate} 
                        activarAudioIOS={activarAudioIOS} reproducirAlarma={reproducirAlarma} 
                    />
                )}


                {/* --- MÓDULO PERFIL --- */}
                {activeModule === 'perfil' && (
                    <ModuloPerfil 
                        setActiveModule={setActiveModule} 
                        user={user} setUser={setUser} 
                        db={db} setDb={setDb} 
                    />
                )}


                {/* --- MÓDULO GIMNASIO --- */}
                {activeModule === 'gym' && (
                    <ModuloGym 
                        setActiveModule={setActiveModule} user={user} setUser={setUser} recordDate={recordDate} setRecordDate={setRecordDate} db={db} setDb={setDb} 
                        routinesMap={routinesMap} setRoutinesMap={setRoutinesMap} activeRoutine={activeRoutine} setActiveRoutine={setActiveRoutine} selectedEx={selectedEx} setSelectedEx={setSelectedEx} 

                        globalWorkoutTime={globalWorkoutTime} setGlobalWorkoutTime={setGlobalWorkoutTime} isWorkoutActive={isWorkoutActive} setIsWorkoutActive={setIsWorkoutActive}
                        timerM={timerM} setTimerM={setTimerM} isActiveM={isActiveM} setIsActiveM={setIsActiveM} timerF={timerF} setTimerF={setTimerF} isActiveF={isActiveF} setIsActiveF={setIsActiveF}
                        activarAudioIOS={activarAudioIOS} reproducirAlarma={reproducirAlarma} formatTime={formatTime} getTargetTime={getTargetTime}
                        workoutSetsMap={workoutSetsMap} setWorkoutSetsMap={setWorkoutSetsMap} rpeModal={rpeModal} setRpeModal={setRpeModal} mentzerModal={mentzerModal} setMentzerModal={setMentzerModal}
                        globalUnit={globalUnit} setGlobalUnit={setGlobalUnit} globalBar={globalBar} setGlobalBar={setGlobalBar} exercisesToRender={exercisesToRender}
                    />
                )}

              </div>
            </div>
          );
        }

        // Registrar el Service Worker para permitir instalación
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
