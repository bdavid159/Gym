          const reproducirAlarma = () => { 
              if (!audioCtxRef.current) return;
              
              // 1. Intentar vibrar (Bloqueado por Apple en iOS, pero funciona excelente en Android)
              if ("vibrate" in navigator) {
                  navigator.vibrate([400, 200, 400, 200, 400]); 
              }

              // 2. Crear una alarma de TRIPLE pitido fuerte
              const ctx = audioCtxRef.current;
              const now = ctx.currentTime;
              
              const playBeep = (startTime) => {
                  const osc = ctx.createOscillator();
                  const gainNode = ctx.createGain();
                  osc.connect(gainNode);
                  gainNode.connect(ctx.destination);
                  
                  osc.type = 'square'; // Tono estridente tipo despertador digital
                  osc.frequency.setValueAtTime(700, startTime); 
                  
                  gainNode.gain.setValueAtTime(1, startTime);
                  gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.4); 
                  
                  osc.start(startTime);
                  osc.stop(startTime + 0.4);
              };

              // Disparamos 3 pitidos con medio segundo de separación
              playBeep(now);
              playBeep(now + 0.5);
              playBeep(now + 1.0);
          };

                    // --- VIGILANTE DE HIDRATACIÓN (ALARMAS) ---

                    });

                    for (let i = todaysHistory.length; i < totalSeries; i++) {
                        const prevSet = prevMap[exId]?.[i];
                        if (prevSet && !prevSet.completed) {
                            newSets.push(prevSet);

                        }
                    }
                    newMap[exId] = newSets;
                });
                return newMap;
            });
          }, [user, selectedEx, activeRoutine, db, recordDate]);

          const updateSet = (exId, index, field, value) => { const newMap = { ...workoutSetsMap }; newMap[exId][index][field] = value; setWorkoutSetsMap(newMap); };
          
          const updateDropSet = (exId, setIndex, dropIndex, field, value) => {

                                                            </div>
                                                            <div className="space-y-4">
                                                                {ejerciciosHechos[u].map(ej => {
                                                                    let actMainSet = 0;
                                                                    return (
                                                                    <div key={ej.exId} className="bg-white p-3 rounded-2xl border border-gray-200 shadow-sm">
                                                                        <div className="flex justify-between items-start mb-3">
                                                                            <p className="text-sm font-black text-gray-900 max-w-[70%]">{ej.data.name}</p>
                                                                            <button onClick={(e) => borrarEjercicioHistorial(sesion.date, u, ej.exId, e)} className="text-[10px] text-red-500 bg-red-50 hover:bg-red-100 px-2 py-1 rounded font-bold transition-colors">Borrar Ejercicio</button>
                                                                        </div>
                                                                        
                                                                        <div className="flex text-[9px] font-black text-gray-400 uppercase tracking-wider mb-1 px-1">
                                                                            <div className="w-8 text-center">Set</div>
                                                                            <div className="flex-1 text-center">Carga</div>
                                                                            <div className="flex-1 text-center">Reps</div>
                                                                            <div className="w-10 text-center">RPE</div>
                                                                        </div>
                                                                        
                                                                        <div className="space-y-1">
                                                                            {ej.series.map((s, sIdx) => {
                                                                                const isWarmup = s.setType === 'warmup';
                                                                                if (!isWarmup) actMainSet++;
                                                                                return (
                                                                                    <div key={sIdx} className={`flex items-center text-xs font-bold py-1.5 px-1 rounded-lg ${isWarmup ? 'bg-gray-100' : 'bg-gray-50'}`}>
                                                                                        <div className="w-8 text-center text-gray-500">{isWarmup ? 'A' : actMainSet}</div>
                                                                                        <div className="flex-1 text-center text-gray-900 flex flex-col items-center justify-center">
                                                                                            <span>{s.weightInput !== undefined ? s.weightInput : (s.barId !== 'none' && s.barId !== 'mancuernas' ? s.weight - (BARBELLS[s.barId] ? (s.unit === 'kg' ? BARBELLS[s.barId].weightKg : BARBELLS[s.barId].weightLbs) : 0) : s.weight)} {s.unit}</span>
                                                                                            {(s.barId !== 'none' && s.barId !== 'mancuernas') && <span className="text-[8px] text-gray-400 font-bold uppercase leading-none mt-0.5">Tot: {s.weightTotal || s.weight}</span>}
                                                                                        </div>

                                                                                        <div className="flex-1 text-center text-gray-900">{s.reps || '-'}</div>
                                                                                        <div className="w-10 text-center text-gray-500">{s.rpe || '-'}</div>
                                                                                    </div>
                                                                                );
                                                                            })}
                                                                        </div>
                                                                    </div>
                                                                )})}
                                                            </div>
                                                        </div>
                                                    ))}
                                                    <div className="mt-6 pt-4 border-t border-gray-200 flex justify-center">
                                                        <button onClick={async (e) => {
                                                            e.stopPropagation();
                                                            if(!window.confirm(`¿Seguro que quieres borrar TODOS los datos de ti y tu esposa del día ${sesion.date}?`)) return;
                                                            const updatedDb = JSON.parse(JSON.stringify(db));
                                                            updatedDb.sesiones_completadas = updatedDb.sesiones_completadas.filter(s => s.date !== sesion.date);
                                                            ['esposo', 'esposa'].forEach(u => { Object.keys(updatedDb[u]).forEach(exId => { if(updatedDb[u][exId].history) { updatedDb[u][exId].history = updatedDb[u][exId].history.filter(h => h.date !== sesion.date); } }); });
                                                            setDb(updatedDb); if (window.fsDb) { try { await window.fsUpdateDoc(window.fsDoc(window.fsDb, "usuarios", "fase2_historial"), { historial: updatedDb }); } catch (error) {} }
                                                        }} className="text-[10px] font-black uppercase tracking-wider text-red-600 bg-white border border-red-200 px-4 py-2 rounded-xl shadow-sm hover:bg-red-50">🗑️ Eliminar Sesión Completa</button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                )}

                 { /* BARRA INFERIOR (AHORA DENTRO DEL GYM) */ }
                <div className="fixed bottom-0 w-full max-w-md bg-white/90 backdrop-blur-md border-t flex justify-around pb-8 pt-3 z-40"><button onClick={() => setActiveTab('dashboard')} className={`w-20 ${activeTab === 'dashboard' ? 'text-[#007aff]' : 'text-gray-400'}`}><span className="text-2xl block text-center">📋</span></button><button onClick={() => setActiveTab('workout')} className={`w-20 ${activeTab === 'workout' ? 'text-[#007aff]' : 'text-gray-400'}`}><div className={`w-12 h-12 rounded-full mx-auto -mt-6 flex items-center justify-center text-white ${activeTab === 'workout' ? 'bg-[#007aff]' : 'bg-gray-800'}`}>💪</div></button><button onClick={() => setActiveTab('stats')} className={`w-20 ${activeTab === 'stats' ? 'text-[#007aff]' : 'text-gray-400'}`}><span className="text-2xl block text-center">🔥</span></button></div> <
                />
                )
                }
                </div> <
                /div>
                );
                }
               // Registrar el Service Worker para permitir instalación
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
